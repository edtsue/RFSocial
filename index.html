<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Rice & Flower — Social Studio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,400&family=Inter:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --paper: #faf7f2;
        --paper-deep: #f3ede3;
        --ink: #2a2620;
        --ink-soft: #6b6358;
        --hairline: #d9cfbf;
        --accent: #8a6f4a;
        --serif: "Cormorant Garamond", "Cormorant", Georgia, serif;
        --sans: "Inter", -apple-system, BlinkMacSystemFont, "Helvetica Neue",
          sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        background: var(--paper);
        color: var(--ink);
      }

      body {
        font-family: var(--sans);
        font-size: 18pt;
        line-height: 1.5;
        font-weight: 300;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      a {
        color: inherit;
      }

      .page {
        max-width: 1440px;
        margin: 0 auto;
        padding: 56px 64px 96px;
      }

      header.masthead {
        text-align: center;
        padding-bottom: 40px;
        border-bottom: 1px solid var(--hairline);
        margin-bottom: 48px;
      }

      .wordmark {
        font-family: var(--serif);
        font-weight: 400;
        letter-spacing: 0.32em;
        font-size: 1.15em;
        margin: 0;
      }

      .tagline {
        font-family: var(--serif);
        font-style: italic;
        font-size: 0.78em;
        color: var(--ink-soft);
        margin-top: 10px;
        letter-spacing: 0.04em;
      }

      .layout {
        display: grid;
        grid-template-columns: 40% 60%;
        gap: 64px;
      }

      @media (max-width: 980px) {
        .page {
          padding: 36px 24px 72px;
        }
        .layout {
          grid-template-columns: 1fr;
          gap: 48px;
        }
      }

      .col-label {
        font-family: var(--serif);
        font-style: italic;
        font-size: 0.72em;
        color: var(--ink-soft);
        letter-spacing: 0.06em;
        margin-bottom: 14px;
      }

      .section {
        padding-bottom: 28px;
        border-bottom: 1px solid var(--hairline);
        margin-bottom: 28px;
      }

      .section:last-child {
        border-bottom: none;
      }

      /* Format picker */
      .format-list {
        list-style: none;
        margin: 0;
        padding: 0;
      }

      .format-list li {
        margin-bottom: 6px;
      }

      .format-btn {
        background: none;
        border: none;
        padding: 4px 0;
        font: inherit;
        font-size: 0.86em;
        color: var(--ink-soft);
        cursor: pointer;
        text-align: left;
        letter-spacing: 0.01em;
      }

      .format-btn:hover {
        color: var(--ink);
      }

      .format-btn.is-selected {
        color: var(--ink);
        border-bottom: 1px solid var(--ink);
        padding-bottom: 2px;
      }

      .format-btn em {
        font-family: var(--serif);
        font-style: italic;
        font-size: 1.05em;
        margin-right: 8px;
      }

      /* Chat */
      .chat-log {
        font-size: 0.78em;
        line-height: 1.6;
        max-height: 52vh;
        overflow-y: auto;
        padding-right: 4px;
      }

      .msg {
        margin-bottom: 18px;
      }

      .msg.user {
        text-align: right;
        color: var(--ink-soft);
      }

      .msg.assistant {
        text-align: left;
        color: var(--ink);
      }

      .msg .who {
        font-family: var(--serif);
        font-style: italic;
        font-size: 0.78em;
        letter-spacing: 0.04em;
        opacity: 0.7;
        display: block;
        margin-bottom: 4px;
      }

      .msg .body {
        white-space: pre-wrap;
      }

      .composer {
        margin-top: 18px;
        display: flex;
        align-items: flex-end;
        gap: 14px;
        border-bottom: 1px solid var(--ink);
        padding-bottom: 8px;
      }

      .composer textarea {
        flex: 1;
        border: none;
        background: transparent;
        resize: none;
        font: inherit;
        font-size: 0.82em;
        color: var(--ink);
        outline: none;
        padding: 6px 0;
        min-height: 1.6em;
        max-height: 6em;
        font-family: var(--sans);
      }

      .composer textarea::placeholder {
        font-family: var(--serif);
        font-style: italic;
        color: var(--ink-soft);
      }

      .send-btn {
        background: none;
        border: none;
        font: inherit;
        font-size: 0.78em;
        color: var(--ink);
        cursor: pointer;
        padding: 6px 0 6px 8px;
        letter-spacing: 0.06em;
        text-transform: lowercase;
      }

      .send-btn:disabled {
        color: var(--ink-soft);
        cursor: not-allowed;
      }

      /* Storyboard */
      .empty-state {
        font-family: var(--serif);
        font-style: italic;
        color: var(--ink-soft);
        font-size: 0.92em;
        padding: 64px 0;
        text-align: center;
      }

      .concept {
        font-family: var(--serif);
        font-size: 1.1em;
        font-style: italic;
        color: var(--ink);
        margin-bottom: 8px;
      }

      .concept-meta {
        font-size: 0.7em;
        color: var(--ink-soft);
        letter-spacing: 0.04em;
        margin-bottom: 32px;
      }

      .frame {
        padding: 28px 0;
        border-top: 1px solid var(--hairline);
        display: grid;
        grid-template-columns: 88px 1fr auto;
        gap: 24px;
        align-items: start;
      }

      .frame:last-child {
        border-bottom: 1px solid var(--hairline);
      }

      .frame-num {
        font-family: var(--serif);
        font-size: 2.4em;
        line-height: 1;
        color: var(--ink);
        font-weight: 300;
      }

      .frame-num small {
        display: block;
        font-family: var(--serif);
        font-style: italic;
        font-size: 0.32em;
        color: var(--ink-soft);
        letter-spacing: 0.08em;
        margin-top: 6px;
      }

      .frame-fields {
        font-size: 0.74em;
        line-height: 1.55;
      }

      .frame-fields dl {
        margin: 0;
        display: grid;
        grid-template-columns: 130px 1fr;
        row-gap: 8px;
        column-gap: 16px;
      }

      .frame-fields dt {
        font-family: var(--serif);
        font-style: italic;
        color: var(--ink-soft);
        font-size: 0.95em;
      }

      .frame-fields dd {
        margin: 0;
        color: var(--ink);
      }

      .frame-duration {
        font-family: var(--serif);
        font-style: italic;
        color: var(--ink-soft);
        font-size: 0.72em;
        white-space: nowrap;
      }

      .caption-block {
        margin-top: 40px;
        padding: 28px 0;
        border-top: 1px solid var(--hairline);
        border-bottom: 1px solid var(--hairline);
      }

      .caption-label {
        font-family: var(--serif);
        font-style: italic;
        font-size: 0.72em;
        color: var(--ink-soft);
        letter-spacing: 0.06em;
        margin-bottom: 10px;
      }

      .caption-text {
        font-size: 0.82em;
        line-height: 1.6;
        white-space: pre-wrap;
        margin-bottom: 18px;
      }

      .hashtags {
        font-size: 0.74em;
        color: var(--ink-soft);
        letter-spacing: 0.02em;
      }

      .actions {
        margin-top: 28px;
        display: flex;
        gap: 24px;
        flex-wrap: wrap;
      }

      .action-btn {
        background: none;
        border: none;
        font: inherit;
        font-size: 0.74em;
        color: var(--ink);
        cursor: pointer;
        padding: 4px 0;
        letter-spacing: 0.04em;
        border-bottom: 1px solid transparent;
      }

      .action-btn:hover {
        border-bottom-color: var(--ink);
      }

      .action-btn:disabled {
        color: var(--ink-soft);
        cursor: not-allowed;
      }

      .loading {
        font-family: var(--serif);
        font-style: italic;
        color: var(--ink-soft);
        font-size: 0.86em;
      }

      .error {
        font-family: var(--serif);
        font-style: italic;
        color: #8a3a2a;
        font-size: 0.78em;
        padding: 8px 0;
      }

      .footnote {
        margin-top: 80px;
        padding-top: 24px;
        border-top: 1px solid var(--hairline);
        text-align: center;
        font-family: var(--serif);
        font-style: italic;
        font-size: 0.62em;
        color: var(--ink-soft);
        letter-spacing: 0.06em;
      }
    </style>
  </head>
  <body>
    <main class="page">
      <header class="masthead">
        <h1 class="wordmark">RICE &nbsp;&amp;&nbsp; FLOWER</h1>
        <div class="tagline">— Social Studio —</div>
      </header>

      <div class="layout">
        <aside class="left">
          <div class="section">
            <div class="col-label">Format</div>
            <ul class="format-list" id="format-list">
              <li>
                <button class="format-btn" data-format="reel">
                  <em>Reel</em>vertical, frame by frame
                </button>
              </li>
              <li>
                <button class="format-btn" data-format="story">
                  <em>Story</em>sequential vertical frames
                </button>
              </li>
              <li>
                <button class="format-btn" data-format="post">
                  <em>Post</em>single image or carousel
                </button>
              </li>
              <li>
                <button class="format-btn" data-format="auto">
                  <em>—</em>let Claude decide
                </button>
              </li>
            </ul>
          </div>

          <div class="section">
            <div class="col-label">Conversation</div>
            <div class="chat-log" id="chat-log">
              <div class="msg assistant">
                <span class="who">Studio</span>
                <div class="body">
                  Begin with an idea — a cake, a moment, a feeling. I'll ask a
                  few questions, then compose a storyboard.
                </div>
              </div>
            </div>
            <div class="composer">
              <textarea
                id="composer-input"
                rows="1"
                placeholder="a peony tier cake reveal —"
              ></textarea>
              <button class="send-btn" id="send-btn">send</button>
            </div>
            <div id="chat-error" class="error" hidden></div>
          </div>
        </aside>

        <section class="right">
          <div class="col-label">Storyboard</div>
          <div id="storyboard">
            <div class="empty-state">
              Your storyboard will appear here, frame by frame.
            </div>
          </div>
        </section>
      </div>

      <div class="footnote">Rice &amp; Flower — atelier of buttercream</div>
    </main>

    <script>
      const state = {
        format: null,
        phase: "idle", // idle | clarifying | ready | generated | revising
        messages: [], // {role, content}
        storyboard: null,
        loading: false,
      };

      const $ = (id) => document.getElementById(id);

      function selectFormat(fmt) {
        state.format = fmt;
        document.querySelectorAll(".format-btn").forEach((b) => {
          b.classList.toggle("is-selected", b.dataset.format === fmt);
        });
      }

      document.querySelectorAll(".format-btn").forEach((btn) => {
        btn.addEventListener("click", () => selectFormat(btn.dataset.format));
      });

      // Auto-grow textarea
      const ta = $("composer-input");
      ta.addEventListener("input", () => {
        ta.style.height = "auto";
        ta.style.height = Math.min(ta.scrollHeight, 6 * 18) + "px";
      });
      ta.addEventListener("keydown", (e) => {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          handleSend();
        }
      });

      $("send-btn").addEventListener("click", handleSend);

      function appendMessage(role, content) {
        state.messages.push({ role, content });
        renderChat();
      }

      function renderChat() {
        const log = $("chat-log");
        log.innerHTML = "";
        // intro is part of UI; render only messages from state
        if (state.messages.length === 0) {
          log.innerHTML = `
            <div class="msg assistant">
              <span class="who">Studio</span>
              <div class="body">Begin with an idea — a cake, a moment, a feeling. I'll ask a few questions, then compose a storyboard.</div>
            </div>`;
        }
        state.messages.forEach((m) => {
          const el = document.createElement("div");
          el.className = "msg " + m.role;
          el.innerHTML = `<span class="who">${
            m.role === "user" ? "You" : "Studio"
          }</span><div class="body"></div>`;
          el.querySelector(".body").textContent = renderForChat(m.content);
          log.appendChild(el);
        });
        if (state.loading) {
          const el = document.createElement("div");
          el.className = "msg assistant";
          el.innerHTML = `<span class="who">Studio</span><div class="body loading">piping…</div>`;
          log.appendChild(el);
        }
        log.scrollTop = log.scrollHeight;
      }

      function renderForChat(content) {
        // Strip JSON fences from chat display — storyboard renders separately
        return content.replace(/```json[\s\S]*?```/g, "").trim() || content;
      }

      async function handleSend() {
        if (state.loading) return;
        const text = ta.value.trim();
        if (!text) return;

        if (!state.format) {
          showError("Choose a format first — Reel, Story, Post, or let me decide.");
          return;
        }

        clearError();
        ta.value = "";
        ta.style.height = "auto";

        appendMessage("user", text);

        // Decide mode based on phase:
        // idle → clarify (first idea)
        // clarifying → storyboard (user has answered)
        // generated → storyboard (user requesting revisions)
        let mode;
        if (state.phase === "idle") {
          mode = "clarify";
          state.phase = "clarifying";
        } else if (state.phase === "clarifying") {
          mode = "storyboard";
          state.phase = "ready";
        } else {
          mode = "storyboard";
          state.phase = "revising";
        }

        await callApi(mode);
      }

      async function callApi(mode) {
        state.loading = true;
        renderChat();
        try {
          const res = await fetch("/api/chat", {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: JSON.stringify({
              mode,
              format: state.format,
              messages: state.messages,
            }),
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || "Request failed");
          state.loading = false;
          appendMessage("assistant", data.text);

          if (mode === "storyboard") {
            const parsed = parseStoryboard(data.text);
            if (parsed) {
              state.storyboard = parsed;
              state.phase = "generated";
              renderStoryboard();
            } else {
              showError(
                "Couldn't parse the storyboard JSON — ask for a regenerate.",
              );
            }
          }
        } catch (err) {
          state.loading = false;
          renderChat();
          showError(err.message || "Something went wrong.");
        }
      }

      function parseStoryboard(text) {
        const fence = text.match(/```json\s*([\s\S]*?)```/);
        const raw = fence ? fence[1] : text;
        try {
          return JSON.parse(raw);
        } catch {
          // Try to extract first {...} block
          const m = raw.match(/\{[\s\S]*\}/);
          if (m) {
            try {
              return JSON.parse(m[0]);
            } catch {
              return null;
            }
          }
          return null;
        }
      }

      function renderStoryboard() {
        const sb = state.storyboard;
        const root = $("storyboard");
        if (!sb || !Array.isArray(sb.frames)) {
          root.innerHTML = `<div class="empty-state">Your storyboard will appear here, frame by frame.</div>`;
          return;
        }

        const frames = sb.frames
          .map((f, i) => {
            const num = String(f.frame_number ?? i + 1).padStart(2, "0");
            const dur =
              typeof f.duration_seconds === "number" && f.duration_seconds > 0
                ? `${f.duration_seconds}s`
                : "";
            return `
              <article class="frame">
                <div class="frame-num">${num}<small>frame</small></div>
                <div class="frame-fields">
                  <dl>
                    ${row("Shot", f.shot_description)}
                    ${row("Camera", f.camera_direction)}
                    ${row("On-screen text", f.on_screen_text)}
                    ${row("Caption", f.caption_segment)}
                    ${row("Audio", f.audio_cue)}
                    ${row("Transition in", f.transition_in)}
                    ${row("Transition out", f.transition_out)}
                  </dl>
                </div>
                <div class="frame-duration">${dur}</div>
              </article>`;
          })
          .join("");

        const totalDur =
          typeof sb.total_duration_seconds === "number"
            ? `${sb.total_duration_seconds}s`
            : "";
        const fmt = (sb.format || state.format || "").toString();

        root.innerHTML = `
          <div class="concept">${escapeHtml(sb.concept || "")}</div>
          <div class="concept-meta">${[fmt, totalDur, `${sb.frames.length} frames`]
            .filter(Boolean)
            .join(" · ")}</div>
          ${frames}
          <div class="caption-block">
            <div class="caption-label">Caption</div>
            <div class="caption-text">${escapeHtml(sb.full_caption || "")}</div>
            <div class="hashtags">${(sb.hashtags || []).map(escapeHtml).join("  ")}</div>
          </div>
          <div class="actions">
            <button class="action-btn" id="copy-btn">Copy storyboard</button>
            <button class="action-btn" id="regen-btn">Regenerate</button>
            <button class="action-btn" id="export-btn">Export as text</button>
          </div>
        `;

        $("copy-btn").addEventListener("click", () =>
          copyText(toPlainText(sb), "Copy storyboard", "Copied"),
        );
        $("export-btn").addEventListener("click", () => downloadText(sb));
        $("regen-btn").addEventListener("click", regenerate);
      }

      function row(label, value) {
        const v = (value || "").toString().trim();
        if (!v) return "";
        return `<dt>${label}</dt><dd>${escapeHtml(v)}</dd>`;
      }

      function escapeHtml(s) {
        return String(s)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");
      }

      function toPlainText(sb) {
        const lines = [];
        lines.push(`Rice & Flower — Storyboard`);
        lines.push(`Format: ${sb.format || ""}`);
        if (sb.total_duration_seconds)
          lines.push(`Duration: ${sb.total_duration_seconds}s`);
        if (sb.concept) lines.push(`Concept: ${sb.concept}`);
        lines.push("");
        sb.frames.forEach((f, i) => {
          lines.push(`Frame ${f.frame_number ?? i + 1}${f.duration_seconds ? ` — ${f.duration_seconds}s` : ""}`);
          if (f.shot_description) lines.push(`  Shot: ${f.shot_description}`);
          if (f.camera_direction) lines.push(`  Camera: ${f.camera_direction}`);
          if (f.on_screen_text) lines.push(`  On-screen: ${f.on_screen_text}`);
          if (f.caption_segment) lines.push(`  Caption: ${f.caption_segment}`);
          if (f.audio_cue) lines.push(`  Audio: ${f.audio_cue}`);
          if (f.transition_in) lines.push(`  Transition in: ${f.transition_in}`);
          if (f.transition_out) lines.push(`  Transition out: ${f.transition_out}`);
          lines.push("");
        });
        if (sb.full_caption) {
          lines.push("Caption:");
          lines.push(sb.full_caption);
          lines.push("");
        }
        if (sb.hashtags?.length) lines.push((sb.hashtags || []).join(" "));
        return lines.join("\n");
      }

      async function copyText(text, restoreLabel, doneLabel) {
        try {
          await navigator.clipboard.writeText(text);
          const btn = $("copy-btn");
          if (btn) {
            btn.textContent = doneLabel;
            setTimeout(() => (btn.textContent = restoreLabel), 1400);
          }
        } catch {
          showError("Copy failed — your browser blocked clipboard access.");
        }
      }

      function downloadText(sb) {
        const blob = new Blob([toPlainText(sb)], { type: "text/plain" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "rice-and-flower-storyboard.txt";
        a.click();
        URL.revokeObjectURL(url);
      }

      async function regenerate() {
        if (state.loading) return;
        // Add a synthetic user nudge so the model knows we want a fresh take
        appendMessage(
          "user",
          "Regenerate the storyboard with a different composition — same idea, fresh shots.",
        );
        state.phase = "revising";
        await callApi("storyboard");
      }

      function showError(msg) {
        const el = $("chat-error");
        el.textContent = msg;
        el.hidden = false;
      }

      function clearError() {
        const el = $("chat-error");
        el.textContent = "";
        el.hidden = true;
      }
    </script>
  </body>
</html>
